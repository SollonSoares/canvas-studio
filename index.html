<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <title>Canvas Studio</title>
</head>
<body>

  <div class="layout-wrapper">
    
    <aside id="dashboard-menu">
      <button id="toggle-sidebar" class="btn-ghost">☰</button>
      
      <div class="brand">
        <h1 id="brand-title" contenteditable="true">Naruto RPG</h1>
      </div>

      <div class="menu-group">
        <span class="menu-label">FILTRO</span>
        <input type="text" id="input-search" name="sidebar_search" placeholder="Buscar conteúdo...">
      </div>

      <nav id="nav-controls">
        <div id="group-gerenciamento" class="menu-group">
          <span class="menu-label">GERENCIAMENTO</span>
          <div id="container-gerenciamento-botoes"></div>
        </div>

        <div id="group-wysiwyg" class="menu-group"></div>
      </nav>

      <div class="sidebar-footer">
        <button id="btn-open-settings" class="btn-icon">⚙️ Configurações</button>
        
        <div class="theme-controller-row">
          <span class="theme-label-text">Modo Claro</span>
          <button id="btn-theme" class="apple-switch">
            <span class="thumb"></span>
          </button>
        </div>
      </div>
    </aside>

    <main id="canvas"></main>

  </div>

  <div id="settings-modal">
    <div class="modal-content">
      
      <div class="modal-header">
        <h3>⚙️ Configurações do Sistema</h3>
        <button id="btn-close-settings" class="btn-close-style">✕</button>
      </div>

      <div class="modal-section-modules">
        <span class="section-title">MÓDULOS ATIVOS</span>
        <div id="module-activation-panel">
          </div>
        <label class="btn-upload">
          ➕ Enviar Novo Módulo (.js)
          <input type="file" id="input-upload-module" accept=".js">
        </label>
      </div>

      <div class="modal-section-canvas">
        <span class="section-title">DIMENSÕES DO CANVAS</span>
        <div class="canvas-input-group">
          <input type="number" id="input-canvas-w" placeholder="Largura (px)" min="100" max="4000" step="1">
          <input type="number" id="input-canvas-h" placeholder="Altura (px)" min="100" max="4000" step="1">
        </div>
        <button id="btn-save-canvas-size" class="btn-primary">Aplicar Dimensões</button>
      </div>

    </div>
  </div>

  <script type="module" src="src/core/App.js"></script>
</body>
</html>
